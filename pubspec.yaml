name: ai_instagram_caption_generator
description: AI powered Instagram caption generator SaaS app with subscriptions.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  # Networking
  http: ^1.2.1

  # Environment
  flutter_dotenv: ^5.1.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Payments (for SaaS billing)
  in_app_purchase: ^3.1.13

  # Loading & UI helpers
  flutter_spinkit: ^5.2.1

  # Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - .env